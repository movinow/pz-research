<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Zomboid 調査データ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic Medium', 'Meiryo',
               'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
  min-height: 100vh;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.container {
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
  background: rgba(255,255,255,0.95);
  border-radius: 16px;
  padding: 40px 30px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.header { text-align: center; margin-bottom: 32px; }
.header h1 {
  color: #2c3e50;
  margin-bottom: 8px;
  font-size: 1.8rem;
}
.header p { color: #7f8c8d; font-size: 0.95rem; }
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.card {
  display: block;
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 12px;
  padding: 24px;
  text-decoration: none;
  color: inherit;
  transition: box-shadow 0.15s, transform 0.15s;
}
.card:hover {
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  transform: translateY(-2px);
}
.card-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: #2c3e50;
  margin-bottom: 8px;
}
.card-desc {
  font-size: 0.88rem;
  color: #666;
  line-height: 1.5;
}
.card-meta {
  margin-top: 12px;
  font-size: 0.78rem;
  color: #95a5a6;
}
.footer {
  margin-top: 32px;
  text-align: center;
  font-size: 0.82rem;
  color: #95a5a6;
}
.footer a {
  color: #7f8c8d;
  text-decoration: none;
}
.footer a:hover { text-decoration: underline; }
@media (max-width: 768px) {
  body { padding: 10px; }
  .container { padding: 24px 16px; }
  .header h1 { font-size: 1.3rem; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Project Zomboid 調査データ</h1>
    <p>Build 42 のゲーム内データを調査・公開</p>
  </div>
  <div class="cards">
    <a class="card" href="./bookstores/">
      <div class="card-title">書店一覧</div>
      <div class="card-desc">全20店舗の所在地・施設種別・マップリンクをまとめた一覧。アイソメトリック画像付き。</div>
      <div class="card-meta">20件 / bookstore部屋タイプ</div>
    </a>
  </div>
  <div class="footer">
    <a href="https://github.com/movinow/pz-research">GitHub</a>
  </div>
</div>
</body>
</html>
